name: docker

# 任意分支 push 都触发新镜像打包；main 分支额外构建 arm64。
on:
  push:
    branches: ['**']

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          SAFE_BRANCH=$(echo "${GITHUB_REF_NAME}" | tr '/_' '--' | tr '[:upper:]' '[:lower:]')
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${OWNER}/geokeep"
          {
            echo "image=${IMAGE}"
            echo "branch_tag=${IMAGE}:${SAFE_BRANCH}"
            echo "sha_tag=${IMAGE}:${SAFE_BRANCH}-${SHORT_SHA}"
          } >> "$GITHUB_OUTPUT"

      - name: Decide platforms
        id: platforms
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "list=linux/amd64,linux/arm64" >> "$GITHUB_OUTPUT"
          else
            echo "list=linux/amd64" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: ${{ steps.platforms.outputs.list }}
          tags: |
            ${{ steps.tags.outputs.branch_tag }}
            ${{ steps.tags.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
